upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Максимальный размер загружаемого файла (для аватарок)
    client_max_body_size 10M;

    # Gzip сжатие для статики
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # ── API проксирование на FastAPI backend ─────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Таймауты (code execution может занимать до 10с)
        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
    }

    # ── Статические файлы (аватарки, загружаемые backend'ом) ─────────────────
    location /static/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_cache_valid  200 1d;
        expires            1d;
        add_header         Cache-Control "public";
    }

    # ── React SPA (всё остальное) ─────────────────────────────────────────────
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;

        # Отключаем кэш для index.html — браузер всегда проверяет свежесть
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # JS/CSS бандлы — Vite добавляет хэш в имена, кэшируем надолго
        location ~* \.(js|css|woff2?|png|svg|ico|jpg|jpeg|gif|webp)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
